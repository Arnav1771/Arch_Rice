# ⚡ Keqing Electro - Epic Hyprlock Configuration

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 5
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.4
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# ⚡ NOW PLAYING / STATUS
label {
    monitor =
    text = cmd[update:1000] echo "$(playerctl metadata --format '󰎆 {{title}}  󰇙  {{artist}}' 2>/dev/null || echo '󰎆 No Music Playing')"
    color = rgba(249, 226, 175, 0.9) # Gold
    font_size = 14
    font_family = JetBrainsMono Nerd Font SemiBold
    position = 0, -50
    halign = center
    valign = top
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.8)
}

# ⚡ TIME
label {
    monitor =
    text = $TIME
    color = rgba(202, 158, 230, 1.0) # Lilac
    font_size = 130
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.6)
}

# ⚡ DATE
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B %Y')" </b>"
    color = rgba(205, 214, 244, 1.0) # Text color
    font_size = 22
    font_family = JetBrainsMono Nerd Font Medium
    position = 0, 30
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

# ⚡ PROFILE AVATAR
image {
    monitor =
    path = ~/.config/hypr/wallpapers/Keqing1.jpg
    size = 120
    rounding = -1 # Circle
    border_size = 4
    border_color = rgba(202, 158, 230, 1.0) # Lilac border
    position = 0, -80
    halign = center
    valign = center
    shadow_passes = 2
}

# ⚡ KEQING QUOTE (USER)
label {
    monitor =
    text = "Don't blink!" — <i>$USER</i>
    color = rgba(249, 226, 175, 1.0) # Gold
    font_size = 18
    font_family = JetBrainsMono Nerd Font Italic
    position = 0, -170
    halign = center
    valign = center
    shadow_passes = 2
}

# ⚡ PASSWORD INPUT
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(202, 158, 230, 0.8) # Lilac border
    inner_color = rgba(30, 30, 46, 0.6) # Dark base
    font_color = rgba(205, 214, 244, 1.0)
    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text = <span foreground="##f9e2af"><i>Speed of light! (Password)</i></span>
    hide_input = false
    rounding = -1 # Pill shape
    check_color = rgba(249, 226, 175, 1.0)
    fail_color = rgba(243, 139, 168, 1.0) # Red
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -250
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 5
}